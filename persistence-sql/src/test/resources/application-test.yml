spring:
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    # We don't have a DB yet, so we just want to verify the bean configuration
    # However, SpringLiquibase tries to execute on afterPropertiesSet
  datasource:
    url: jdbc:postgresql://localhost:5432/dt_sql
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
